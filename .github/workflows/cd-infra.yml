# Infra deploy pipeline for remarkable-fullview.
#
# Coming from Azure DevOps? Two things here have no direct ADO equivalent:
#   - OIDC federated identity (see Stage 1 / CLAUDE.md checkpoint 1.1): instead of a
#     stored service connection, GitHub mints a short-lived token per run and AWS trades
#     it for temporary credentials via `aws-actions/configure-aws-credentials`. Nothing
#     long-lived to leak.
#   - `environment: production` on the deploy job is GitHub's equivalent of an ADO
#     pre-deployment approval gate — configured in repo Settings -> Environments, with
#     Dan set as a required reviewer. The job pauses until he clicks Approve.

name: CD Infra

on:
  pull_request:
    paths:
      - "src/Fullview.Infra/**"
      - "src/Fullview.Api/**"
      - "src/Fullview.Domain/**"
      - ".github/workflows/cd-infra.yml"
  push:
    branches: [main]
    paths:
      - "src/Fullview.Infra/**"
      - "src/Fullview.Api/**"
      - "src/Fullview.Domain/**"
      - ".github/workflows/cd-infra.yml"

permissions:
  contents: read

jobs:
  diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK CLI and Lambda packaging tool
        run: |
          npm install -g aws-cdk
          dotnet tool install -g Amazon.Lambda.Tools

      - name: Package placeholder health Lambda
        run: dotnet lambda package -pl src/Fullview.Api -o "${{ github.workspace }}/artifacts/health.zip"

      # No AWS credentials needed for a plain `cdk synth`, but `cdk diff` compares
      # against the deployed stack, so it needs the same read access as a deploy.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - name: cdk diff
        working-directory: src/Fullview.Infra
        env:
          LAMBDA_PACKAGE_PATH: ${{ github.workspace }}/artifacts/health.zip
          FULLVIEW_ALERT_EMAIL: ${{ vars.FULLVIEW_ALERT_EMAIL }}
        run: cdk diff --no-color > diff-output.txt 2>&1 || true

      - name: Comment diff on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const diff = fs.readFileSync("src/Fullview.Infra/diff-output.txt", "utf8");
            const body = `#### CDK Diff\n<details><summary>Show diff</summary>\n\n\`\`\`\n${diff}\n\`\`\`\n\n</details>`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK CLI and Lambda packaging tool
        run: |
          npm install -g aws-cdk
          dotnet tool install -g Amazon.Lambda.Tools

      - name: Package placeholder health Lambda
        run: dotnet lambda package -pl src/Fullview.Api -o "${{ github.workspace }}/artifacts/health.zip"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - name: cdk deploy
        working-directory: src/Fullview.Infra
        env:
          LAMBDA_PACKAGE_PATH: ${{ github.workspace }}/artifacts/health.zip
          FULLVIEW_ALERT_EMAIL: ${{ vars.FULLVIEW_ALERT_EMAIL }}
        run: cdk deploy --require-approval never
